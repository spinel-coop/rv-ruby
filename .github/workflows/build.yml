name: Build

on:
  workflow_dispatch:
    inputs:
      formula:
        required: true
        type: string
  workflow_call:
    inputs:
      formula:
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  attestations: write

env:
  HOMEBREW_DEVELOPER: 1
  HOMEBREW_NO_AUTO_UPDATE: 1

jobs:
  build:
    strategy:
      matrix:
        runner:
          - macos-15-intel # intel
          - macos-14 # arm
          - ubuntu-24.04
          - ubuntu-24.04-arm
      fail-fast: false
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Get version for setup-ruby
        env:
          FORMULA: ${{ inputs.formula }}
        run: |
          SETUP_RUBY_VERSION="${FORMULA}"
          SETUP_RUBY_VERSION=${SETUP_RUBY_VERSION//rv-ruby}
          SETUP_RUBY_VERSION=${SETUP_RUBY_VERSION//@}
          if [[ "$SETUP_RUBY_VERSION" == "3.2."* ]]; then
            echo SETUP_RUBY_VERSION=${SETUP_RUBY_VERSION} >> $GITHUB_ENV
          fi

      # Static gem extensions typically require the same Ruby version available already
      - uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        id: setup-ruby
        if: ${{ env.SETUP_RUBY_VERSION != '' }}
        with:
          ruby-version: ${{ env.SETUP_RUBY_VERSION }}

      - name: Install Homebrew
        run: |
          which brew || /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          if [[ -d "/home/linuxbrew/" ]]; then
            echo "/home/linuxbrew/.linuxbrew/bin" >> $GITHUB_PATH
            echo "/home/linuxbrew/.linuxbrew/sbin" >> $GITHUB_PATH
            eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          fi

      - name: Tap repo
        run: bin/setup

      - name: Build rv Ruby
        env:
          HOMEBREW_NO_INSTALL_CLEANUP: 1
          SETUP_RUBY_PREFIX: ${{ steps.setup-ruby.outputs.ruby-prefix }}
          FORMULA: ${{ inputs.formula }}
        run: |
          if [[ -n "$SETUP_RUBY_PREFIX" ]]; then
            export HOMEBREW_BASERUBY="${SETUP_RUBY_PREFIX}/bin/ruby"
          fi
          mkdir -p rubies/
          cd rubies
          brew rv-package --verbose "$FORMULA"

      - name: Upload rv Ruby
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.formula }}_${{ matrix.runner }}
          path: ${{ github.workspace }}/rubies

      - name: Generate build attestation
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: rubies/*.tar.gz

      - name: Test Portable Ruby
        env:
          FORMULA: ${{ inputs.formula }}
        run: |
          mkdir -p rv-ruby/
          tar --strip-components 2 -C rv-ruby -xf rubies/*.tar.gz
          export PATH="${PWD}/rv-ruby/bin:${PATH}"
          if [[ "$FORMULA" == "rv-ruby@0.49" ]]; then
            ruby --version
          else
            ruby --version --yjit
            ruby -r debug -r bigdecimal -r json -r yaml -r reline -e "true"
          fi
